services:
  db:
    image: postgres:16-alpine
    container_name: mevak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mevak}
      POSTGRES_USER: ${POSTGRES_USER:-mevak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_in_prod}
    ports:
      - "5432:5432"
    volumes:
      - mevak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mevak} -d ${POSTGRES_DB:-mevak}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      args:
        APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5000}
    container_name: mevak-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-mevak}:${POSTGRES_PASSWORD:-change_this_in_prod}@db:5432/${POSTGRES_DB:-mevak}
      ADMIN_EMAIL: admin@mevakbeautycenter.com
      ADMIN_PASSWORD: admin123
    ports:
      - "5000:5000"

volumes:
  mevak_postgres_data:
